<!DOCTYPE html>
<html>
<head>
    <title>Fraud Detection</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f6f8;
            text-align: center;
            padding: 40px;
        }

        .container {
            background: white;
            padding: 25px;
            border-radius: 10px;
            width: 60%;
            margin: auto;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        input {
            width: 90%;
            padding: 10px;
            margin-top: 10px;
        }

        button {
            margin-top: 15px;
            padding: 10px 20px;
            background: #007BFF;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }

        .result {
            margin-top: 20px;
            font-size: 18px;
        }

        .error {
            color: red;
        }

        .success {
            color: green;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Fraud Detection System</h2>
    <p>Enter 30 comma-separated values</p>

    <form method="POST" action="/predict">
        <input name="inputData" placeholder="e.g. -1.3, 0.2, ... 30 values">
        <br>
        <button type="submit">Predict</button>
    </form>

    <div class="result">
        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}

        {% if prediction is not none %}
            <p class="success">
                Prediction: {{ prediction }} <br>
                Probability: {{ probability }}
            </p>
        {% endif %}
    </div>
</div>

</body>
</html>
